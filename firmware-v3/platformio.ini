; ============================================================================
; Brightness Floor Perceptual Test (standalone, hardware test)
; Cycles through gamma-corrected brightness levels on WS2812B for dark-room
; evaluation. Minimal firmware — no WiFi, no audio, no effects engine.
; Build: pio run -e test_brightness_floor
; Flash: pio run -e test_brightness_floor -t upload
; Serial: pio device monitor -e test_brightness_floor
; ============================================================================
[env:test_brightness_floor]
platform = espressif32@6.9.0
board = esp32-s3-devkitc1-n16r8
framework = arduino
monitor_speed = 115200
monitor_raw = yes
upload_speed = 115200
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi
build_unflags = -std=gnu++11
build_flags =
	-std=gnu++17
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D CONFIG_TINYUSB_CDC_ENABLED=1
	-D DISABLE_ALL_LIBRARY_WARNINGS
	; Use FastLED's custom RMT driver (matches firmware-v3 production config)
	-D FASTLED_RMT_BUILTIN_DRIVER=0
	-D FASTLED_ESP32_FLASH_LOCK=0
	-D FASTLED_INTERRUPT_RETRY_COUNT=0
	-D FASTLED_RMT_MAX_TICKS_FOR_GTX_SEM=100
	-D FASTLED_RMT_MAX_CHANNELS=4
; Only compile the test source, not the entire src/ tree
build_src_filter =
	-<*>
	+<../test/test_brightness_floor/main.cpp>
lib_deps =
	fastled/FastLED@3.10.0

; ============================================================================
; AMOLED Test Rig — Waveshare ESP32-S3-Touch-AMOLED-2.41 (RM690B0, 600×450)
; Headless test rig: runs full firmware + AMOLED diagnostic display.
; No physical LEDs required (WS2812 is unidirectional).
;
; GPIO mapping:
;   WS2812:  Strip1=GPIO4, Strip2=GPIO5 (default, SD card pins unused)
;   I2S:     LRCL=GPIO40, DOUT=GPIO39, BCLK=GPIO41 (moved from 38)
;   AMOLED:  QSPI CS=9, CLK=10, D0-D3=11-14, RST=38 (hardwired)
;   I2C:     SDA=15, SCL=16 (CH422G expander + RTC)
;
; Build: pio run -e amoled_testrig
; Flash: pio run -e amoled_testrig -t upload --upload-port /dev/cu.usbmodem212401
; Serial: pio device monitor -e amoled_testrig
; ============================================================================
[env:amoled_testrig]
extends = env:esp32dev_audio_base
; upload_port detected dynamically — use --upload-port on CLI
upload_flags =
	--before=usb_reset
	--after=no_reset
build_flags =
	${env:esp32dev_audio_base.build_flags}
	; Board identification
	-D BOARD_AMOLED241=1
	; AMOLED display feature
	-D FEATURE_AMOLED_DISPLAY=1
	; I2S pin overrides for test rig wiring
	-D K1_I2S_LRCL=40
	-D K1_I2S_DOUT=39
	; BCLK=38 is the chip_amoled241.h default — no conflict (AMOLED_RST is GPIO 21)
	; No status strip on this board
	-D FEATURE_STATUS_STRIP_TOUCH=0
	; AP-only mode (test rig doesn't need STA)
	-D WIFI_AP_ONLY=1
	; Audio backend: PipelineCore for maximum analysis features
	-D FEATURE_AUDIO_BACKEND_PIPELINECORE=1
	; Logging override (level 3 = Info)
	-D CORE_DEBUG_LEVEL=3
	-D LW_LOG_LEVEL=3
build_unflags =
	-std=gnu++11
	-D CORE_DEBUG_LEVEL=4
	-D LW_LOG_LEVEL=4
build_src_filter =
	+<*>
	-<hal/esp32p4/>
	-<test_strip_hw.cpp>
	-<audio/GoertzelAnalyzer.cpp>
	-<audio/ChromaAnalyzer.cpp>

; AMOLED Test Rig + ESV11 32kHz audio backend
; Build: pio run -e amoled_testrig_esv11_32khz
[env:amoled_testrig_esv11_32khz]
extends = env:esp32dev_audio_esv11
build_flags =
	${env:esp32dev_audio_esv11.build_flags}
	-D BOARD_AMOLED241=1
	-D FEATURE_AMOLED_DISPLAY=1
	-D K1_I2S_LRCL=40
	-D K1_I2S_DOUT=39
	; BCLK=38 is the chip_amoled241.h default
	-D FEATURE_STATUS_STRIP_TOUCH=0
	-D WIFI_AP_ONLY=1
	-D FEATURE_AUDIO_BACKEND_ESV11_32KHZ=1
	-include src/audio/backends/esv11/EsV11_32kHz_Shim.h
	-D CORE_DEBUG_LEVEL=3
	-D LW_LOG_LEVEL=3
build_unflags =
	-std=gnu++11
	-D CORE_DEBUG_LEVEL=4
	-D LW_LOG_LEVEL=4

