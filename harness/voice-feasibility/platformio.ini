; =============================================================================
; Voice Feasibility Harness — microWakeWord (TFLite Micro)
; =============================================================================
;
; Purpose: Prove custom wake word detection on K1 hardware using microWakeWord.
;          No effects, no renderer, no WiFi, no actor system.
;          Just: mic → TFLite Micro → wake word → AMOLED dashboard.
;
; Hardware target: Waveshare ESP32-S3 2.41" AMOLED (N16R8)
;   - 16 MB flash, 8 MB OPI PSRAM
;   - SPH0645 MEMS microphone on I2S0
;   - SH8601 QSPI AMOLED 600x450
;
; Uses pioarduino fork for Arduino ESP32 v3.x (IDF 5.x).
;
; Build:   cd harness/voice-feasibility && pio run
; Upload:  cd harness/voice-feasibility && pio run -t upload
; Monitor: cd harness/voice-feasibility && pio device monitor -b 115200
; =============================================================================

[env:voice_harness]
; --- Platform: pioarduino fork for Arduino ESP32 v3.x (IDF 5.x) ---
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
framework = arduino

; --- Board: ESP32-S3 N16R8 ---
board = esp32-s3-devkitc-1

; --- Board build overrides for N16R8 (16MB flash, 8MB OPI PSRAM) ---
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; --- Build flags ---
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; --- SPH0645 microphone GPIO pinout ---
    -DI2S_BCLK_GPIO=38
    -DI2S_WS_GPIO=40
    -DI2S_DIN_GPIO=39
    ; --- Display: SH8601 QSPI AMOLED on Waveshare board (GPIO 9-14, RST=21) ---
    ; --- Debug output ---
    -DCORE_DEBUG_LEVEL=3

; --- Serial monitor ---
monitor_speed = 115200
upload_port = /dev/cu.usbmodem212401

; --- Libraries: TFLite Micro + audio frontend ---
lib_deps =
    johnosbb/MicroTFLite@1.0.4
    kahrendt/ESPMicroSpeechFeatures@1.1.0

lib_ldf_mode = deep+

; =============================================================================
; Voice Harness + ESP-SR Command Recognition (proof-of-build)
; =============================================================================
; Extends the base voice_harness with Espressif ESP-SR (MultiNet5 English Q8).
; Purpose: Prove that esp-sr compiles, links, and boots alongside microWakeWord.
;
; Build:  cd harness/voice-feasibility && pio run -e voice_harness_sr
; Upload: cd harness/voice-feasibility && pio run -e voice_harness_sr -t upload
;
; Model flashing (one-time, after first upload):
;   esptool.py --port /dev/cu.usbmodem212401 write_flash 0xD10000 \
;     ~/.platformio/packages/framework-arduinoespressif32-libs/esp32s3/esp_sr/srmodels.bin
; =============================================================================

[env:voice_harness_sr]
; --- Platform: same pioarduino fork ---
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
framework = arduino

; --- Board: ESP32-S3 N16R8 ---
board = esp32-s3-devkitc-1

; --- Board build overrides for N16R8 (16MB flash, 8MB OPI PSRAM) ---
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 16MB
board_build.partitions = partitions_sr_16.csv

; --- Build flags ---
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; --- SPH0645 microphone GPIO pinout ---
    -DI2S_BCLK_GPIO=38
    -DI2S_WS_GPIO=40
    -DI2S_DIN_GPIO=39
    ; --- ESP-SR proof-of-build ---
    -DESP_SR_ENABLED=1
    ; --- Debug output ---
    -DCORE_DEBUG_LEVEL=3

; --- Serial monitor ---
monitor_speed = 115200
upload_port = /dev/cu.usbmodem212401

; --- Libraries: TFLite Micro + audio frontend ---
lib_deps =
    johnosbb/MicroTFLite@1.0.4
    kahrendt/ESPMicroSpeechFeatures@1.1.0

lib_ldf_mode = deep+
