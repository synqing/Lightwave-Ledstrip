; Zone Mixer — AtomS3 + PaHub v2.1 Physical Controller for K1 Zone Composer
; Hardware: 4x Unit-Scroll + 2x M5Rotate8 on PCA9548A I2C multiplexer
; Architecture: DJ-mixer paradigm — scroll wheels for zone brightness, knobs for selection

[env:atoms3]
platform = https://github.com/pioarduino/platform-espressif32.git#54.03.21
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; --- Libraries ---
lib_deps =
    m5stack/M5Unified@^0.2.2
    bblanchon/ArduinoJson@^7.0.0
    links2004/WebSockets@^2.4.0
    ; M5UnitScroll — local lib/ copy (official M5Stack, uses endTransmission(false) correctly)
    ; M5ROTATE8 — local lib/ copy (patched: endTransmission(false) in read functions)

; --- Build flags ---
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
